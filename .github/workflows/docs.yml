
name: Build documentation
on:
  push:
    branches: [ "main" ]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "**.py"
      - "pyproject.toml"
permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pdoc .
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: source ./.build_docs.sh
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

  deploy:          
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
    
